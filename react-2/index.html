<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Department of Nothing</title>
  <meta
    name="description"
    content="A React-powered page that looks impressive, says a lot, and proudly accomplishes nothing."
  />
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            boxShadow: {
              glow: "0 0 60px rgba(56, 189, 248, 0.28)",
            },
          },
        },
      },
    };
  </script>
  <style>
    @keyframes stakeholderFloat {
      0% {
        transform: translateX(-50%) translateY(0) scale(var(--scale, 1));
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translateX(calc(-50% + var(--drift-x, 0vw))) translateY(-120vh) scale(var(--scale, 1.15));
        opacity: 0;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>

</html>
